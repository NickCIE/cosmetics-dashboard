<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Beauty 수출입 대시보드</title>
  <script src="data.js"></script>
  <script src="https://unpkg.com/globe.gl/dist/globe.gl.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #060b14;
      color: #e8f4fd;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ───────────────────────────────── */
    #sidebar {
      width: 288px;
      min-width: 288px;
      background: #08111f;
      border-right: 1px solid #12253d;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 10;
    }

    #logo {
      padding: 18px 16px 14px;
      border-bottom: 1px solid #12253d;
      background: linear-gradient(135deg, #0a1a30, #08111f);
    }
    #logo h1 { font-size: 15px; font-weight: 700; color: #00d4ff; letter-spacing: 0.3px; }
    #logo p  { font-size: 11px; color: #3d6b8e; margin-top: 4px; }

    .section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 1.8px;
      color: #2d5270; text-transform: uppercase;
      padding: 14px 16px 6px;
    }

    /* ── CATEGORIES ────────────────────────────── */
    .cat-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .cat-item:hover { background: rgba(255,255,255,0.03); }
    .cat-item.active {
      background: rgba(0,212,255,0.06);
      border-left-color: var(--cc);
    }
    .cat-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--cc); flex-shrink: 0;
      box-shadow: 0 0 6px var(--cc);
    }
    .cat-name { font-size: 12.5px; color: #8cb4cc; flex: 1; }
    .cat-item.active .cat-name { color: #e8f4fd; }
    .cat-badge {
      font-size: 9px; color: #2d5270;
      background: rgba(45,82,112,0.2);
      padding: 2px 5px; border-radius: 8px;
      border: 1px solid #12253d;
    }

    /* ── TIME CONTROLS ─────────────────────────── */
    #time-controls {
      padding: 14px 16px;
      border-top: 1px solid #12253d;
      border-bottom: 1px solid #12253d;
    }

    .mode-toggle {
      display: flex; background: #060b14;
      border: 1px solid #12253d; border-radius: 6px;
      overflow: hidden; margin-bottom: 14px;
    }
    .mode-btn {
      flex: 1; padding: 7px 0; text-align: center;
      font-size: 11.5px; cursor: pointer; color: #3d6b8e;
      transition: all 0.2s; user-select: none;
    }
    .mode-btn.active { background: #12253d; color: #00d4ff; }

    .slider-block { margin-bottom: 14px; }
    .slider-header {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #3d6b8e; margin-bottom: 7px;
    }
    .slider-header .val { color: #6ec6e0; font-weight: 600; }

    input[type="range"] {
      width: 100%; -webkit-appearance: none; appearance: none;
      height: 3px; background: #12253d; border-radius: 2px;
      outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: #00d4ff; cursor: pointer;
      box-shadow: 0 0 8px rgba(0,212,255,0.6);
    }
    input[type="range"]::-webkit-slider-runnable-track {
      background: linear-gradient(to right, #00d4ff var(--prog, 0%), #12253d var(--prog, 0%));
      height: 3px; border-radius: 2px;
    }

    .play-row {
      display: flex; align-items: center; gap: 8px; margin-top: 4px;
    }
    .play-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid #12253d; background: #0d1e30;
      color: #00d4ff; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .play-btn:hover { border-color: #00d4ff; background: #12253d; }
    .play-btn.playing { color: #ff6b6b; border-color: #ff6b6b; }

    .speed-select {
      background: #060b14; border: 1px solid #12253d;
      color: #6ec6e0; padding: 5px 6px; border-radius: 5px;
      font-size: 11px; outline: none; cursor: pointer; width: 68px;
    }
    .play-hint { font-size: 10px; color: #2d5270; }

    /* ── STATS ─────────────────────────────────── */
    #stats { padding: 14px 16px 20px; }

    .stat-card {
      background: #060b14; border: 1px solid #12253d;
      border-radius: 8px; padding: 11px 13px; margin-bottom: 10px;
    }
    .stat-label { font-size: 9px; color: #2d5270; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
    .stat-main { font-size: 22px; font-weight: 700; color: #00d4ff; line-height: 1; }
    .stat-unit { font-size: 10px; color: #3d6b8e; margin-left: 3px; }
    .stat-sub  { font-size: 10px; color: #3d6b8e; margin-top: 4px; }

    .top-row {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 0; border-bottom: 1px solid #0c1d2e;
    }
    .top-row:last-child { border-bottom: none; }
    .top-num { font-size: 9px; color: #2d5270; width: 12px; flex-shrink: 0; }
    .top-name { font-size: 12px; color: #8cb4cc; width: 68px; flex-shrink: 0; }
    .top-bar-wrap {
      flex: 1; height: 3px; background: #0c1d2e; border-radius: 2px;
    }
    .top-bar { height: 100%; border-radius: 2px; background: var(--cc); }
    .top-pct { font-size: 10px; color: #3d6b8e; width: 34px; text-align: right; flex-shrink: 0; }

    /* ── MAIN GLOBE AREA ───────────────────────── */
    #main { flex: 1; position: relative; overflow: hidden; }

    #globe-container { width: 100%; height: 100%; }

    /* ── PERIOD BADGE (top right) ──────────────── */
    #period-badge {
      position: absolute; top: 18px; right: 20px;
      background: rgba(8,17,31,0.88);
      border: 1px solid #12253d; border-radius: 9px;
      padding: 9px 16px; backdrop-filter: blur(10px);
      pointer-events: none;
    }
    #period-badge .pb-label { font-size: 9px; color: #2d5270; letter-spacing: 0.8px; margin-bottom: 3px; }
    #period-badge .pb-val   { font-size: 18px; font-weight: 700; color: #00d4ff; }

    /* ── CATEGORY BADGE (top left of globe) ────── */
    #cat-badge {
      position: absolute; top: 18px; left: 18px;
      background: rgba(8,17,31,0.88);
      border: 1px solid #12253d; border-radius: 9px;
      padding: 9px 14px; backdrop-filter: blur(10px);
      pointer-events: none; display: flex; align-items: center; gap: 8px;
    }
    #cat-badge .cb-dot {
      width: 8px; height: 8px; border-radius: 50%;
      box-shadow: 0 0 8px var(--cc);
    }
    #cat-badge .cb-name { font-size: 13px; font-weight: 600; color: #e8f4fd; }
    #cat-badge .cb-type { font-size: 10px; color: #3d6b8e; margin-top: 1px; }

    /* ── TOOLTIP ───────────────────────────────── */
    #tooltip {
      position: fixed;
      background: rgba(8,17,31,0.96);
      border: 1px solid #1e3d5c;
      border-radius: 9px; padding: 11px 14px;
      pointer-events: none; z-index: 100; display: none;
      backdrop-filter: blur(12px);
      min-width: 160px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    .tt-country { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 7px; }
    .tt-row { display: flex; justify-content: space-between; gap: 20px; margin-top: 3px; font-size: 12px; }
    .tt-lbl { color: #3d6b8e; }
    .tt-val { color: #00d4ff; font-weight: 600; }

    /* ── LOADING ───────────────────────────────── */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #060b14; z-index: 50; gap: 16px;
    }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid #12253d;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #3d6b8e; }

    /* ── SCROLLBAR ─────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #12253d; border-radius: 2px; }
  </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar">
  <div id="logo">
    <h1>K-Beauty 수출입 대시보드</h1>
    <p>한국 화장품 수출입 현황 · 2000.01 – 2026.02</p>
  </div>

  <div class="section-label">카테고리</div>
  <div id="cat-list"></div>

  <div class="section-label">시점 선택</div>
  <div id="time-controls">
    <div class="mode-toggle">
      <div class="mode-btn active" id="btn-single" onclick="setMode('single')">단일 월</div>
      <div class="mode-btn"        id="btn-range"  onclick="setMode('range')">기간 범위</div>
    </div>

    <!-- single mode -->
    <div id="ctrl-single">
      <div class="slider-block">
        <div class="slider-header">
          <span>시점</span>
          <span class="val" id="lbl-single">—</span>
        </div>
        <input type="range" id="sl-single" min="0" max="1" value="1">
      </div>
    </div>

    <!-- range mode -->
    <div id="ctrl-range" style="display:none">
      <div class="slider-block">
        <div class="slider-header">
          <span>시작</span>
          <span class="val" id="lbl-start">—</span>
        </div>
        <input type="range" id="sl-start" min="0" max="1" value="0">
      </div>
      <div class="slider-block">
        <div class="slider-header">
          <span>종료</span>
          <span class="val" id="lbl-end">—</span>
        </div>
        <input type="range" id="sl-end" min="0" max="1" value="1">
      </div>
    </div>

    <div class="play-row">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">&#9654;</button>
      <select class="speed-select" id="speed-sel">
        <option value="800">0.5×</option>
        <option value="400" selected>1×</option>
        <option value="200">2×</option>
        <option value="80">5×</option>
      </select>
      <span class="play-hint">재생 속도</span>
    </div>
  </div>

  <div class="section-label">데이터 현황</div>
  <div id="stats">
    <div class="stat-card">
      <div class="stat-label">총 수출 / 수입액</div>
      <div>
        <span class="stat-main" id="st-total">—</span>
        <span class="stat-unit">천달러</span>
      </div>
      <div class="stat-sub" id="st-period">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">국가별 비중 (상위 5)</div>
      <div id="top-list"></div>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div id="main">
  <div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">지구본 로딩 중...</div>
  </div>

  <div id="globe-container"></div>

  <div id="cat-badge">
    <div>
      <div class="cb-dot" id="cb-dot" style="--cc:#00d4ff; background:#00d4ff"></div>
    </div>
    <div>
      <div class="cb-name" id="cb-name">화장품 수출</div>
      <div class="cb-type" id="cb-type">한국 → 세계</div>
    </div>
  </div>

  <div id="period-badge">
    <div class="pb-label">선택 기간</div>
    <div class="pb-val" id="pb-val">—</div>
  </div>
</div>

<!-- ===== TOOLTIP ===== -->
<div id="tooltip">
  <div class="tt-country" id="tt-name"></div>
  <div class="tt-row">
    <span class="tt-lbl" id="tt-lbl">수출액</span>
    <span class="tt-val" id="tt-val">—</span>
  </div>
  <div class="tt-row">
    <span class="tt-lbl">비중</span>
    <span class="tt-val" id="tt-pct">—</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════
const CAT_DEFS = [
  { id: 'cosmetics_export',       name: '화장품 수출',   color: '#00d4ff', type: 'export' },
  { id: 'china_import',           name: '중국 화장품 수입', color: '#ff9500', type: 'import' },
  { id: 'us_import',              name: '미국 화장품 수입', color: '#4facfe', type: 'import' },
  { id: 'haircare_export',        name: '헤어케어 수출',  color: '#43e97b', type: 'export' },
  { id: 'dental_export',          name: '덴탈케어 수출',  color: '#fa709a', type: 'export' },
  { id: 'daily_goods_export',     name: '생활용품 수출',  color: '#fee140', type: 'export' },
  { id: 'maskpack_export',        name: '마스크팩 수출',  color: '#a18cd1', type: 'export' },
  { id: 'color_cosmetics_export', name: '색조화장품 수출', color: '#fd7f6f', type: 'export' },
  { id: 'basic_cosmetics_export', name: '기초화장품 수출', color: '#b8e994', type: 'export' },
];

const CAM = {
  cosmetics_export:       { lat: 28,  lng: 130,  alt: 2.2 },
  china_import:           { lat: 25,  lng: 90,   alt: 2.0 },
  us_import:              { lat: 40,  lng: -40,  alt: 2.2 },
  haircare_export:        { lat: 28,  lng: 130,  alt: 2.5 },
  dental_export:          { lat: 28,  lng: 115,  alt: 2.5 },
  daily_goods_export:     { lat: 28,  lng: 115,  alt: 2.5 },
  maskpack_export:        { lat: 28,  lng: 130,  alt: 2.2 },
  color_cosmetics_export: { lat: 28,  lng: 130,  alt: 2.2 },
  basic_cosmetics_export: { lat: 28,  lng: 130,  alt: 2.2 },
};

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
const months   = COSMETICS_DATA.months;
const maxIdx   = months.length - 1;
let catId      = 'cosmetics_export';
let mode       = 'single';
let singleIdx  = 0;
let startIdx   = 0;
let endIdx     = 0;
let isPlaying  = false;
let playTimer  = null;
let globe      = null;
let mouseX     = 0, mouseY = 0;

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
function toLabel(idx) {
  const [y, m] = months[idx].split('-');
  return `${y}년 ${m}월`;
}

function lastDataIdx(catKey) {
  const total = COSMETICS_DATA.categories[catKey].total;
  for (let i = total.length - 1; i >= 0; i--) {
    if (total[i] !== null) return i;
  }
  return 0;
}

function fmtVal(v) {
  if (!v) return '—';
  if (v >= 1e9)  return '$' + (v / 1e9).toFixed(2) + 'B';
  if (v >= 1e6)  return '$' + (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3)  return '$' + (v / 1e3).toFixed(0) + 'K';
  return '$' + v.toLocaleString();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}

function updateSliderTrack(el) {
  const pct = ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1);
  el.style.setProperty('--prog', pct + '%');
}

// ════════════════════════════════════════════════
// UI INIT
// ════════════════════════════════════════════════
function initUI() {
  const last = lastDataIdx('cosmetics_export');
  singleIdx = last;
  endIdx    = last;
  startIdx  = Math.max(0, last - 11);

  ['sl-single','sl-start','sl-end'].forEach(id => {
    document.getElementById(id).max = maxIdx;
  });
  document.getElementById('sl-single').value = singleIdx;
  document.getElementById('sl-start').value  = startIdx;
  document.getElementById('sl-end').value    = endIdx;

  // Category list
  const list = document.getElementById('cat-list');
  CAT_DEFS.forEach(c => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (c.id === catId ? ' active' : '');
    el.style.setProperty('--cc', c.color);
    el.dataset.id = c.id;
    el.innerHTML = `
      <div class="cat-dot"></div>
      <span class="cat-name">${c.name}</span>
      <span class="cat-badge">${c.type === 'export' ? '수출' : '수입'}</span>
    `;
    el.onclick = () => selectCat(c.id);
    list.appendChild(el);
  });

  // Slider events
  document.getElementById('sl-single').oninput = e => {
    singleIdx = +e.target.value;
    updateSliderTrack(e.target);
    refreshLabels(); updateGlobe();
  };
  document.getElementById('sl-start').oninput = e => {
    startIdx = +e.target.value;
    if (startIdx > endIdx) { endIdx = startIdx; document.getElementById('sl-end').value = endIdx; updateSliderTrack(document.getElementById('sl-end')); }
    updateSliderTrack(e.target); refreshLabels(); updateGlobe();
  };
  document.getElementById('sl-end').oninput = e => {
    endIdx = +e.target.value;
    if (endIdx < startIdx) { startIdx = endIdx; document.getElementById('sl-start').value = startIdx; updateSliderTrack(document.getElementById('sl-start')); }
    updateSliderTrack(e.target); refreshLabels(); updateGlobe();
  };

  ['sl-single','sl-start','sl-end'].forEach(id => {
    updateSliderTrack(document.getElementById(id));
  });

  refreshLabels();
}

function refreshLabels() {
  document.getElementById('lbl-single').textContent = toLabel(singleIdx);
  document.getElementById('lbl-start').textContent  = toLabel(startIdx);
  document.getElementById('lbl-end').textContent    = toLabel(endIdx);

  const pbv = document.getElementById('pb-val');
  if (mode === 'single') {
    pbv.textContent = toLabel(singleIdx);
  } else {
    pbv.textContent = toLabel(startIdx) + ' ~ ' + toLabel(endIdx);
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-single').classList.toggle('active', m === 'single');
  document.getElementById('btn-range').classList.toggle('active',  m === 'range');
  document.getElementById('ctrl-single').style.display = m === 'single' ? 'block' : 'none';
  document.getElementById('ctrl-range').style.display  = m === 'range'  ? 'block' : 'none';
  refreshLabels(); updateGlobe();
}

function selectCat(id) {
  catId = id;
  document.querySelectorAll('.cat-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  const def = CAT_DEFS.find(c => c.id === id);
  // Update badges
  document.getElementById('cb-dot').style.background  = def.color;
  document.getElementById('cb-dot').style.setProperty('--cc', def.color);
  document.getElementById('cb-dot').style.boxShadow   = `0 0 8px ${def.color}`;
  document.getElementById('cb-name').textContent = def.name;
  const cat = COSMETICS_DATA.categories[id];
  if (cat.type === 'export') {
    document.getElementById('cb-type').textContent = '한국 → 세계';
  } else {
    const dest = cat.destination.name;
    document.getElementById('cb-type').textContent = `세계 → ${dest}`;
  }
  document.getElementById('st-total').style.color = def.color;
  // Move camera
  if (globe) globe.pointOfView(CAM[id], 900);
  updateGlobe();
}

// ════════════════════════════════════════════════
// GLOBE INIT
// ════════════════════════════════════════════════
function initGlobe() {
  const container = document.getElementById('globe-container');

  globe = Globe()
    (container)
    .backgroundColor('rgba(0,0,0,0)')
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .showAtmosphere(true)
    .atmosphereColor('rgba(0,140,210,0.12)')
    .atmosphereAltitude(0.22)
    // arcs
    .arcsData([])
    .arcStartLat(d => d.sLat).arcStartLng(d => d.sLng)
    .arcEndLat(d => d.eLat).arcEndLng(d => d.eLng)
    .arcColor(d => d.color)
    .arcStroke(d => d.stroke)
    .arcDashLength(0.35)
    .arcDashGap(0.15)
    .arcDashAnimateTime(d => d.speed)
    .arcAltitudeAutoScale(0.38)
    .onArcHover(handleHover)
    // points (bars)
    .pointsData([])
    .pointLat(d => d.lat).pointLng(d => d.lng)
    .pointColor(d => d.color)
    .pointRadius(d => d.radius)
    .pointAltitude(d => d.alt)
    .onPointHover(handleHover)
    // labels above bars
    .labelsData([])
    .labelLat(d => d.lat)
    .labelLng(d => d.lng)
    .labelAltitude(d => d.alt)
    .labelText(d => d.text)
    .labelSize(d => d.size)
    .labelColor(d => d.color)
    .labelResolution(3)
    .labelIncludeDot(false);

  globe.controls().autoRotate      = true;
  globe.controls().autoRotateSpeed = 0.25;
  globe.controls().enableDamping   = true;
  globe.controls().dampingFactor   = 0.07;

  container.addEventListener('pointerdown', () => {
    globe.controls().autoRotate = false;
  });

  globe.pointOfView(CAM[catId], 0);

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
  }, 2200);

  updateGlobe();
}

// ════════════════════════════════════════════════
// UPDATE GLOBE
// ════════════════════════════════════════════════
function updateGlobe() {
  if (!globe) return;
  const cat  = COSMETICS_DATA.categories[catId];
  const def  = CAT_DEFS.find(c => c.id === catId);
  const [r,g,b] = hexToRgb(def.color);

  // Aggregate values for period
  const si = mode === 'single' ? singleIdx : startIdx;
  const ei = mode === 'single' ? singleIdx : endIdx;

  const flowData = [];
  for (const [code, f] of Object.entries(cat.flows)) {
    let val = 0;
    for (let i = si; i <= ei; i++) {
      if (f.values[i] !== null) val += f.values[i];
    }
    if (val > 0) flowData.push({ code, name: f.name, lat: f.lat, lng: f.lng, val });
  }

  const total  = flowData.reduce((s, f) => s + f.val, 0);
  const maxVal = flowData.length ? Math.max(...flowData.map(f => f.val)) : 1;

  const arcs   = [];
  const points = [];

  flowData.forEach(f => {
    const ratio  = f.val / maxVal;
    const opBase = 0.25 + ratio * 0.75;
    const stroke = 0.25 + ratio * 2.8;
    const speed  = 800 + (1 - ratio) * 2400;

    let sLat, sLng, eLat, eLng;
    if (cat.type === 'export') {
      sLat = cat.origin.lat;      sLng = cat.origin.lng;
      eLat = f.lat;               eLng = f.lng;
    } else {
      sLat = f.lat;               sLng = f.lng;
      eLat = cat.destination.lat; eLng = cat.destination.lng;
    }

    arcs.push({
      sLat, sLng, eLat, eLng,
      color: [`rgba(${r},${g},${b},0.03)`, `rgba(${r},${g},${b},${opBase.toFixed(2)})`],
      stroke, speed,
      name: f.name, val: f.val, total,
    });

    // Bar at destination (export) or source country (import)
    const bLat = cat.type === 'export' ? eLat : sLat;
    const bLng = cat.type === 'export' ? eLng : sLng;
    points.push({
      lat: bLat, lng: bLng,
      alt:    0.008 + ratio * 0.16,
      radius: 0.35  + ratio * 0.55,
      color:  `rgba(${r},${g},${b},${(0.45 + ratio * 0.55).toFixed(2)})`,
      name: f.name, val: f.val, total,
    });
  });

  // Origin / destination anchor point
  const anchor = cat.type === 'export' ? cat.origin : cat.destination;
  points.push({
    lat: anchor.lat, lng: anchor.lng,
    alt: 0.004, radius: 0.85,
    color: '#ffffff',
    name: anchor.name, val: total, total,
  });

  // Labels above bars
  const labels = [];
  flowData.forEach(f => {
    const ratio   = f.val / maxVal;
    const barAlt  = 0.008 + ratio * 0.16;
    const lblAlt  = barAlt + 0.03;
    labels.push({
      lat:   f.lat,
      lng:   f.lng,
      alt:   lblAlt,
      text:  '$' + f.val.toLocaleString(),
      size:  0.42 + ratio * 0.28,
      color: `rgba(255,255,255,${(0.7 + ratio * 0.3).toFixed(2)})`,
    });
  });

  globe.arcsData(arcs).pointsData(points).labelsData(labels);
  updateStats(flowData, total, def);
  refreshLabels();
}

// ════════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════════
function updateStats(flowData, total, def) {
  document.getElementById('st-total').textContent = total ? total.toLocaleString() : '—';
  const si = mode === 'single' ? singleIdx : startIdx;
  const ei = mode === 'single' ? singleIdx : endIdx;
  document.getElementById('st-period').textContent =
    si === ei ? toLabel(si) : toLabel(si) + ' ~ ' + toLabel(ei);

  const sorted = [...flowData].sort((a,b) => b.val - a.val).slice(0, 5);
  const top = document.getElementById('top-list');
  top.innerHTML = '';
  const mx = sorted.length ? sorted[0].val : 1;
  sorted.forEach((f, i) => {
    const pct = total ? (f.val / total * 100).toFixed(1) : '0';
    const bar = (f.val / mx * 100).toFixed(0);
    const row = document.createElement('div');
    row.className = 'top-row';
    row.style.setProperty('--cc', def.color);
    row.innerHTML = `
      <span class="top-num">${i+1}</span>
      <span class="top-name">${f.name}</span>
      <div class="top-bar-wrap"><div class="top-bar" style="width:${bar}%;background:${def.color}"></div></div>
      <span class="top-pct">${pct}%</span>
    `;
    top.appendChild(row);
  });
}

// ════════════════════════════════════════════════
// HOVER TOOLTIP
// ════════════════════════════════════════════════
function handleHover(obj) {
  const tt = document.getElementById('tooltip');
  if (!obj || !obj.name) { tt.style.display = 'none'; return; }
  const def = CAT_DEFS.find(c => c.id === catId);
  document.getElementById('tt-name').textContent = obj.name;
  document.getElementById('tt-lbl').textContent  = def.type === 'export' ? '수출액' : '수입액';
  document.getElementById('tt-val').textContent  =
    obj.val ? obj.val.toLocaleString() + ' 천달러' : '—';
  document.getElementById('tt-pct').textContent  =
    (obj.total && obj.val) ? (obj.val / obj.total * 100).toFixed(1) + '%' : '—';
  tt.style.display  = 'block';
  tt.style.left = (mouseX + 16) + 'px';
  tt.style.top  = (mouseY - 50) + 'px';
}

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  const tt = document.getElementById('tooltip');
  if (tt.style.display !== 'none') {
    tt.style.left = (mouseX + 16) + 'px';
    tt.style.top  = (mouseY - 50) + 'px';
  }
});

// ════════════════════════════════════════════════
// PLAY / PAUSE
// ════════════════════════════════════════════════
function togglePlay() {
  isPlaying ? pausePlay() : startPlay();
}

function startPlay() {
  isPlaying = true;
  const btn = document.getElementById('play-btn');
  btn.innerHTML = '&#9646;&#9646;';
  btn.classList.add('playing');

  const speed = +document.getElementById('speed-sel').value;
  playTimer = setInterval(() => {
    if (mode === 'single') {
      singleIdx++;
      if (singleIdx > maxIdx) { singleIdx = 0; }
      document.getElementById('sl-single').value = singleIdx;
      updateSliderTrack(document.getElementById('sl-single'));
    } else {
      const span = endIdx - startIdx;
      startIdx++; endIdx++;
      if (endIdx > maxIdx) {
        endIdx   = maxIdx;
        startIdx = Math.max(0, endIdx - span);
        pausePlay(); return;
      }
      document.getElementById('sl-start').value = startIdx;
      document.getElementById('sl-end').value   = endIdx;
      updateSliderTrack(document.getElementById('sl-start'));
      updateSliderTrack(document.getElementById('sl-end'));
    }
    refreshLabels();
    updateGlobe();
  }, speed);
}

function pausePlay() {
  isPlaying = false;
  const btn = document.getElementById('play-btn');
  btn.innerHTML = '&#9654;';
  btn.classList.remove('playing');
  clearInterval(playTimer); playTimer = null;
}

// ════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initUI();
  initGlobe();
  // init stat color
  document.getElementById('st-total').style.color = CAT_DEFS[0].color;
});
</script>
